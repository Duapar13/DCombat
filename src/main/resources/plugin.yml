name: DCombat
version: '${project.version}'
main: com.dcombat.DCombat
api-version: '26.1'
author: Duapar
description: Tag de combat PvP anti-combat-log, suivi des kills/morts/séries, classement - pour tout serveur factions/PvP D(nom).
softdepend: [DAPI]

permissions:
  dcombat.use:
    description: Autorise à consulter ses statistiques PvP et le classement.
    default: true

commands:
  kills:
    description: Affiche les statistiques PvP d'un joueur.
    usage: /kills [joueur]
  pvptop:
    description: Classement PvP (kills, morts ou série).
    usage: /pvptop [kills|deaths|streak]
